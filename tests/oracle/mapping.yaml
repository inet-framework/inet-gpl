# sysctl / --option <-> INET Tcp.ned parameter mapping for the oracle framework's
# leg-I preprocessor. Parameter names verified against
# src/inet/transportlayer/tcp/Tcp.ned (INET commit pinned in corpus.yaml).
#
# Semantics:
#   sysctl:   known kernel sysctl -> ini override, with a value transform.
#             `enum` transforms carry a `values` map; a script value not present
#             in `values` is recorded as an unmapped_knob but does NOT block the
#             run unless the entry also sets `required: true` below.
#   option:   in-script `--flag[=value]` lines (packetdrill script options, not
#             sysctls) -> ini override.
#   ignore:   knobs we've deliberately decided not to model (buffer autotuning,
#             pacing ratios, pure-timing retry counts, pacing, notsent_lowat...).
#             Recorded as "known, intentionally unmapped" -- never surfaces as an
#             unmapped_knob and never blocks.
#   required: sysctl/option names where an *unrecognized* value should block the
#             run (I_UNSUPPORTED_CONFIG) rather than silently proceed with INET's
#             own default. Kept minimal (empty) by design: most gaps are more
#             informative as an observed DIVERGENCE (with a kernel_source_hint)
#             than as a pre-run block. `tcp_congestion_control=cubic` maps to
#             INET's TcpCubic (Workstream C) since 2026-07-13; the remaining
#             unmapped algorithms (bbr etc.) are recorded in `unmapped_knobs`
#             so the comparator can flag "possibly CC-attributable" on any
#             resulting DIVERGENCE without blocking scripts where the CC
#             algorithm never actually gets exercised.
#   known_preambles: backtick-block content patterns that resolve to a fixed
#             sysctl set, so the preprocessor doesn't need to shell-parse
#             defaults.sh at runtime. Effective sets copied verbatim from the
#             pinned corpus commits (see corpus.yaml) on 2026-07-11 -- re-copy
#             if the corpus is re-pinned and defaults.sh changed.

sysctl:
  net.ipv4.tcp_sack:
    ini: "**.tcp.sackSupport"
    transform: bool
  net.ipv4.tcp_window_scaling:
    ini: "**.tcp.windowScalingSupport"
    transform: bool
  net.ipv4.tcp_timestamps:
    ini: "**.tcp.timestampSupport"
    transform: bool
  net.ipv4.tcp_ecn:
    # Kernel 7.x AccECN-era semantics (verified against net/ipv4 source +
    # the corpus's own script expectations, e.g. tcp_accecn_ecn3.pkt "tcp_ecn=4
    # uses RFC3168 ECN for SYN", tcp_accecn_serverside_only.pkt tcp_ecn=5
    # accepting SEWA without requesting): 0=off, 1=request+accept classic,
    # 2=accept-only classic, 3=request+accept AccECN, 4=request classic /
    # accept AccECN (INET has no exact mode; rfc3168 matches the client-side
    # request behavior every corpus user of 4 asserts), 5=accept-only AccECN.
    # Maps to tcpEcnMode (which supersedes ecnWillingness; INET errors if
    # both are set, so this fully replaces the old bool mapping).
    ini: "**.tcp.tcpEcnMode"
    transform: enum
    values:
      "0": '"off"'
      "1": '"rfc3168"'
      "2": '"passive"'
      "3": '"accecn"'
      "4": '"rfc3168"'
      "5": '"accecn-passive"'
  net.ipv4.tcp_ecn_option:
    # AccECN option (kinds 172/174): kernel 0=off, 1=minimal, 2=full. INET's
    # accEcnOptionEnabled is a bool (G6); 0 -> false, 1/2 -> true. The
    # kernel's tcp_ecn_option_beacon (per-RTT beacon frequency) has a
    # different unit than INET's accEcnOptionBeaconAcks (per-ACK) and is left
    # unmapped/recorded rather than mis-translated.
    ini: "**.tcp.accEcnOptionEnabled"
    transform: bool
  net.ipv4.tcp_notsent_lowat:
    # TCP_NOTSENT_LOWAT (Workstream H4): INET's notsentLowat is @unit(B) and
    # uses -1 = disabled where Linux uses UINT_MAX.
    ini: "**.tcp.notsentLowat"
    transform: int
    suffix: "B"
    special:
      "4294967295": "-1"
  net.ipv4.tcp_fastopen:
    # THROWAWAY PREVIEW (Workstream F checkpoint, 2026-07-12): temporarily mapped out
    # of `ignore:` to preview INET's Fast Open (F1-F3 + the client opt-in-scope fix)
    # against the kernel before continuing to F4-F6. Bit 0 = client enabled, bit 1 =
    # server enabled (man 7 tcp TCP_FASTOPEN); matches defaults.sh's 0x3 (both on).
    transform: bitmask
    bits:
      "0x1": "**.tcp.fastopenClientEnabled"
      # Bit 1 (TFO_SERVER_ENABLE) means server Fast Open is *available*, but a
      # plain listener still has to opt in via setsockopt(TCP_FASTOPEN); only the
      # WO_SOCKOPT bits make a listener accept TFO without that opt-in. INET does
      # not model the per-listener setsockopt, so map "accept TFO data on any
      # listener" to bit 0x400 (TFO_SERVER_WO_SOCKOPT2). Otherwise a non-TFO
      # listener under tcp_fastopen=2 (fastopen/server/basic-non-tfo-listener)
      # would wrongly accept the SYN data. fastopenExpOptionEnabled (can PARSE
      # the kind-254 legacy form) rides bit 1, since parsing is harmless even
      # when the listener won't accept -- Linux has no separate toggle for it.
      "0x2": "**.tcp.fastopenExpOptionEnabled"
      "0x400": "**.tcp.fastopenServerEnabled"
      # Bit 9 (0x200, TFO_SERVER_COOKIE_NOT_REQD): accept SYN data carrying no
      # cookie option at all. The corpus's basic-cookie-not-reqd / zerocopy
      # fastopen-server tests set 0x202/0x207 plus a per-listener
      # setsockopt(TCP_FASTOPEN) (which oracle.py's script scan translates to
      # fastopenServerEnabled), so this bit only needs to carry the
      # cookie-not-required half.
      "0x200": "**.tcp.fastopenAcceptWithoutCookie"
  net.ipv4.tcp_frto:
    # F-RTO spurious-RTO detection (RFC 5682). Kernel: 0=off, 1=basic, 2=SACK-
    # enhanced when possible (the default, what defaults.sh pins). INET
    # implements the SACK-enhanced variant behind a single bool.
    ini: "**.tcp.frtoEnabled"
    transform: bool
  net.ipv4.tcp_congestion_control:
    ini: "**.tcp.tcpAlgorithmClass"
    transform: enum
    values:
      # values are quoted: command-line --key=value goes through OMNeT++'s ini
      # expression parser, where an unquoted word is a parameter reference,
      # not a string (caught live the first time an enum value was actually
      # emitted -- previously cubic was unmapped so this never fired)
      reno: '"TcpReno"'
      newreno: '"TcpNewReno"'
      vegas: '"TcpVegas"'
      westwood: '"TcpWestwood"'
      dctcp: '"DcTcp"'
      cubic: '"TcpCubic"'
      none: '"TcpNoCongestionControl"'
      # bbr, bic, htcp, illinois, highspeed,
      # scalable, lp, veno, yeah, hybla: no INET flavour exists. Deliberately
      # absent from `values` -> recorded as unmapped_knob; NOT set in ini
      # (INET keeps its own default TcpReno), and NOT blocking (required below
      # covers only the case where the script demands strict emulation of one
      # of these and would be actively misleading run with Reno silently
      # substituted -- see `required` list; currently none, kept as an escape
      # hatch for a future finding that some script's assertions are Reno-vs-X
      # sensitive enough to warrant hard-blocking).

option:
  --mss:
    ini: "**.tcp.mss"
    transform: int
  --mtu:
    ini: null
    transform: ignore   # INET's fixed L2 MTU isn't wired to a single tcp.* param; tracked as unmapped_knob
  # Addressing/timing options already fixed by the oracle harness itself
  # (IPV4_FLAGS in oracle.py for leg L; the sim network's static addresses for
  # leg I). A script setting these to the same values we already use is a
  # no-op; recorded as unmapped rather than silently dropped so a script that
  # ever needs a genuinely different address is still visible in the report.
  --remote_ip: {ini: null, transform: ignore}
  --local_ip: {ini: null, transform: ignore}
  --ip_version: {ini: null, transform: ignore}
  --gateway_ip: {ini: null, transform: ignore}
  --netmask_ip: {ini: null, transform: ignore}
  # Timing-tolerance options: handled uniformly via oracle.py's
  # --tolerance-usecs (leg L) and **.pdapp.latency (leg I), not per-script.
  --tolerance_usecs: {ini: null, transform: ignore}
  --tcp_ts_tick_usecs: {ini: null, transform: ignore}
  --strict_segments: {ini: null, transform: ignore}

ignore:
  # Buffer autotuning: INET has no receive-window autotuning at all (fixed
  # advertisedWindow); tcp_rmem/tcp_wmem are Linux's autotuning bounds and have
  # no faithful static translation. Every corpus script sets these via
  # defaults.sh -- if this were "required" it would blanket-block ~all scripts,
  # hiding the more precise DIVERGENCE/MATCH signal. Left as a known, tracked gap.
  - net.ipv4.tcp_rmem
  - net.ipv4.tcp_wmem
  # Retry counts / timers that only matter for scripts specifically exercising
  # SYN retransmission counts or FRTO, which are either already dialect-gapped
  # or out of tier-1 scope; not worth per-script mapping yet.
  - net.ipv4.tcp_syn_retries
  - net.ipv4.tcp_synack_retries
  - net.ipv4.tcp_dsack
  - net.ipv4.tcp_fack
  - net.ipv4.tcp_reordering
  - net.ipv4.tcp_slow_start_after_idle
  - net.ipv4.tcp_early_retrans
  - net.ipv4.tcp_recovery
  - net.ipv4.tcp_tso_win_divisor
  - net.ipv4.tcp_pacing_ss_ratio
  - net.ipv4.tcp_pacing_ca_ratio
  - net.ipv4.tcp_fastopen_key
  - net.ipv4.tcp_syncookies
  - net.ipv4.tcp_metrics    # `ip tcp_metrics flush all` in defaults.sh -- no sysctl, no ini equivalent
  - net.ipv4.tcp_min_rtt_wlen

required: []   # see note in `sysctl.net.ipv4.tcp_congestion_control` above

known_preambles:
  - match: '^\./defaults\.sh$'
    # kernel selftest corpus: tools/testing/selftests/net/packetdrill/defaults.sh
    # (commit d96fcfe1, pinned 2026-07-10)
    sysctls:
      net.ipv4.tcp_rmem: "4096 540000 15728640"
      net.ipv4.tcp_wmem: "4096 262144 4194304"
      net.ipv4.tcp_timestamps: "1"
      net.ipv4.tcp_syn_retries: "5"
      net.ipv4.tcp_synack_retries: "5"
      net.ipv4.tcp_frto: "2"
      net.ipv4.tcp_sack: "1"
      net.ipv4.tcp_dsack: "1"
      net.ipv4.tcp_fack: "0"
      net.ipv4.tcp_reordering: "3"
      net.ipv4.tcp_congestion_control: "cubic"
      net.ipv4.tcp_slow_start_after_idle: "0"
      net.ipv4.tcp_early_retrans: "4"
      net.ipv4.tcp_recovery: "1"
      net.ipv4.tcp_tso_win_divisor: "3"
      net.ipv4.tcp_ecn: "0"
      net.ipv4.tcp_pacing_ss_ratio: "200"
      net.ipv4.tcp_pacing_ca_ratio: "120"
      net.ipv4.tcp_notsent_lowat: "4294967295"
      net.ipv4.tcp_fastopen: "0x3"
      net.ipv4.tcp_fastopen_key: "a1a1a1a1-b2b2b2b2-c3c3c3c3-d4d4d4d4"
      net.ipv4.tcp_syncookies: "1"
      # window_scaling not set explicitly by this defaults.sh -- Linux kernel
      # default (CONFIG default, effectively "1"/on) applies. Encoded here so
      # the mapping surfaces windowScalingSupport=true for kernel-corpus scripts;
      # INET's own default is false, so this materially matters.
      net.ipv4.tcp_window_scaling: "1"
  - match: '^\.\./(common/)?defaults\.sh$'
    # google/packetdrill gtests/net/tcp/common/defaults.sh (and net/common/defaults.sh)
    # (commit 2c4001c4, pinned 2026-03-11) -- same content as the kernel selftest
    # defaults.sh plus tcp_ecn_option; net-effect on our sysctl map is identical.
    sysctls:
      net.ipv4.tcp_rmem: "4096 540000 15728640"
      net.ipv4.tcp_wmem: "4096 262144 4194304"
      net.ipv4.tcp_timestamps: "1"
      net.ipv4.tcp_syn_retries: "5"
      net.ipv4.tcp_synack_retries: "5"
      net.ipv4.tcp_frto: "2"
      net.ipv4.tcp_sack: "1"
      net.ipv4.tcp_dsack: "1"
      net.ipv4.tcp_fack: "0"
      net.ipv4.tcp_reordering: "3"
      net.ipv4.tcp_congestion_control: "cubic"
      net.ipv4.tcp_slow_start_after_idle: "0"
      net.ipv4.tcp_early_retrans: "4"
      net.ipv4.tcp_recovery: "1"
      net.ipv4.tcp_tso_win_divisor: "3"
      net.ipv4.tcp_ecn: "0"
      net.ipv4.tcp_ecn_option: "2"
      net.ipv4.tcp_pacing_ss_ratio: "200"
      net.ipv4.tcp_pacing_ca_ratio: "120"
      net.ipv4.tcp_window_scaling: "1"
