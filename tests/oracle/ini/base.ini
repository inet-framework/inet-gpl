[General]
network = OracleTcpHost
debug-on-errors = false
cmdenv-express-mode = false
cmdenv-redirect-output = false

**.pdhost.tunApp[0].typename = "PacketDrillApp"
**.pdhost.numTcpTunApps = 1
**.pdhost.numTunInterfaces = 1
**.hasTun = true

**.startTime = 1s

# NOTE: "**.pdhost.routingTable.X" (the pattern the 2015-era legacy tests use)
# does NOT match the actual module path (pdhost.ipv4.routingTable -- Ipv4RoutingTable
# is nested one level deeper under "ipv4" in current INET) and silently never
# loads the routing file. Use "**.routingTable.X" so "**" absorbs the "ipv4" hop.
**.routingTable.routingFile = "ned/pdhost.mrt"
**.pdhost.tunApp[0].localPort = 1000
**.pdhost.tunApp[0].remotePort = 2000
**.pdhost.tunApp[0].localAddress = "192.168.0.1"
**.pdhost.tunApp[0].remoteAddress = "192.168.0.2"

# INET's own PacketDrillApp comparator (compareTcpHeader et al.) does not
# actually get invoked for these scripts -- confirmed by instrumenting it and
# observing zero calls on a known-good run, and by proving a script with a
# deliberately wrong ACK number still reports no error through the
# unmodified legacy test harness. So MATCH/DIVERGENCE cannot be read off
# PacketDrillApp's own "Packetdrill error:" log output; the oracle framework
# instead captures INET's actually-emitted packets via PcapRecorder and
# compares them against the script's own outbound assertions in Python (see
# oracle.py's parse_pcap()/parse_expected_packets()/compare_wire()). The
# pcapFile path is overridden per-run from oracle.py.
**.pdhost.numPcapRecorders = 1
**.pdhost.pcapRecorder[0].pcapFile = "out/pcap/_unset.pcap"
**.pdhost.pcapRecorder[0].moduleNamePatterns = "tun[0]"
**.pdhost.pcapRecorder[0].sendingSignalNames = "packetSentToUpper"
**.pdhost.pcapRecorder[0].receivingSignalNames = "packetReceivedFromUpper"
**.pdhost.pcapRecorder[0].alwaysFlush = true

# Timing tolerance for leg I: the corpus was authored against real-kernel
# timing (RTOs, delayed ACKs...); INET's own timers won't line up to the
# microsecond. This is deliberately generous at framework bring-up -- a
# DIVERGENCE whose message starts with "Packet arrived at the wrong time" at
# this tolerance is a genuine timing gap worth narrowing later, not noise.
**.pdhost.tunApp[0].latency = 0.5s

**.pdapp.dataTransferMode = "bytecount"

# INET Tcp.ned defaults intentionally differ from Linux's (see the parity
# plan); mapping.yaml's per-script ini_overrides layer on top of these when
# the script's sysctl preamble asks for something else. These are the
# baseline for scripts that don't override anything explicit.
**.tcp.mss = 1460
**.tcp.sackSupport = false
**.tcp.windowScalingSupport = false
**.tcp.timestampSupport = false
**.tcp.advertisedWindow = 29200
**.tcp.useDataNotification = true
